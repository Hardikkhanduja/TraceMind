services:
  postgres:
    image: postgres:17

    container_name: tracemind-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracemind

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image:
      redis:7-alpine
    container_name: tracemind-redis
    restart: unless-stopped
    ports:  
    - "6379:6379"

volumes:
  postgres_data: